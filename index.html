<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <title>Razredni Live Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h1>Upiši ime</h1>
  <input id="name">
  <button onclick="join()">Ulaz</button>
</div>

<div id="controls" style="display:none;">
  <button class="plus" onclick="vote(1)">+1</button>
  <button class="minus" onclick="vote(-1)">-1</button>
</div>

<div id="board"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="app.js"></script>
</body>
</html>
